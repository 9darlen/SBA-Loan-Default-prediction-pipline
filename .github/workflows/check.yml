name: Python Basic Check
on: [push] # 每次推送到 GitHub 都會觸發

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 對齊實習環境版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1. Run Unit Tests (Quality Gate)
        # 確保 FeatureBuilder 邏輯穩健
        run: python test_pipeline.py 

      - name: 2. Run Smoke Test Training
        # 啟動測試模式，確保能產出 test_pipeline.joblib
        run: python train_pipeline.py --mode=test

      - name: 3. Syntax Check
        run: python -m py_compile app.py feature_builder.py train_pipeline.py

      - name: Upload Test Model Artifact 
        # 將測試產出的 joblib 暫存，方便你確認流程是否真的跑通
        uses: actions/upload-artifact@v4
        with:
          name: test-pipeline-artifact
          path: test_pipeline.joblib